function castMvp(vi,ni){
  G.mvpVotes[vi]=ni;
  // update button styles for this voter row
  var players=G.players;
  for(var x=0;x<players.length;x++){
    if(x===vi) continue;
    var btn=document.getElementById("mvopt"+vi+"_"+x);
    if(!btn) continue;
    if(x===ni){btn.classList.add("selected");}
    else{btn.classList.remove("selected");}
  }
  var chk=document.getElementById("mvchk"+vi);
  if(chk) chk.textContent="✓";
  // check if all voted
  var cnt=0; for(var k in G.mvpVotes) cnt++;
  var lb=document.getElementById("mvpLockBtn");
  if(lb&&cnt===G.players.length) lb.style.display="block";
}

function drawMvpResult(){
  var players=G.players;
  // tally
  var tally=new Array(players.length).fill(0);
  for(var k in G.mvpVotes){ tally[G.mvpVotes[k]]++; }
  var maxV=0;
  for(var i=0;i<tally.length;i++) if(tally[i]>maxV) maxV=tally[i];
  var winners=[];
  for(var i=0;i<tally.length;i++) if(tally[i]===maxV) winners.push(i);

  var sorted=players.map(function(_,i){return i;}).filter(function(i){return tally[i]>0;});
  sorted.sort(function(a,b){return tally[b]-tally[a];});

  var html="<div class='page'><div class='mvp-wrap'>";
  html+="<div class='mvp-header'>";
  html+="<div class='mvp-icon'>🏆</div>";
  html+="<h2 class='mvp-title'>BEST ACTOR</h2>";
  html+="<p class='mvp-tamil'>சிறந்த நடிகர்</p>";
  html+="</div>";

  // winner banner
  if(winners.length===1){
    var wi=winners[0];
    html+="<div class='mvp-result'>";
    html+="<div class='mvp-star'>"+av(wi)+"</div>";
    html+="<p class='mvp-crown'>🎬 BEST ACTOR OF THE GAME</p>";
    html+="<p class='mvp-winner-name'>"+h(players[wi])+"</p>";
    html+="<p class='mvp-votes-lbl'>"+tally[wi]+" vote"+(tally[wi]>1?"s":"")+" · The ultimate bluffer!</p>";
    html+="</div>";
  } else {
    // tie
    html+="<div class='mvp-result'>";
    html+="<div class='mvp-star'>🤝</div>";
    html+="<p class='mvp-crown'>🎬 IT'S A TIE!</p>";
    html+="<p class='mvp-winner-name'>"+winners.map(function(wi){return h(players[wi]);}).join(" &amp; ")+"</p>";
    html+="<p class='mvp-votes-lbl'>"+maxV+" vote"+(maxV>1?"s":"")+" each · Both equally brilliant fakers!</p>";
    html+="</div>";
  }

  // vote tally bars
  if(sorted.length>0){
    html+="<p style='font-size:.6rem;letter-spacing:.35em;color:var(--text3);font-weight:700;margin-bottom:10px'>VOTE TALLY</p>";
    html+="<div class='mvp-tally'>";
    for(var ri=0;ri<sorted.length;ri++){
      var i=sorted[ri];
      var isWin=winners.indexOf(i)>=0;
      var pct=Math.round((tally[i]/players.length)*100);
      html+="<div class='mvp-trow'>";
      html+="<div class='vav' style='background:"+col(i)+"'>"+av(i)+"</div>";
      html+="<span style='flex:1;font-size:.82rem;color:var(--text2);font-weight:"+(isWin?"700":"500")+"'>"+h(players[i])+(isWin?" 🎭":"")+"</span>";
      html+="<div class='mvp-tbar-wrap'>";
      html+="<div class='mvp-tbar"+(isWin?" gold":"")+"' style='width:"+pct+"%'></div></div>";
      html+="<span class='mvp-tcnt'>"+tally[i]+"</span>";
      html+="</div>";
    }
    html+="</div>";
  }

  // who voted for whom
  html+="<div style='background:rgba(156,39,176,.04);border:1px solid rgba(156,39,176,.12);border-radius:12px;padding:12px 14px;margin-bottom:18px'>";
  html+="<p style='font-size:.6rem;letter-spacing:.3em;color:var(--text3);font-weight:700;margin-bottom:8px'>VOTES CAST</p>";
  for(var k in G.mvpVotes){
    var vi=parseInt(k), ni=G.mvpVotes[k];
    html+="<div style='display:flex;align-items:center;gap:6px;margin-bottom:5px'>";
    html+="<div class='vav' style='background:"+col(vi)+";width:22px;height:22px;font-size:.7rem'>"+av(vi)+"</div>";
    html+="<span style='font-size:.78rem;color:var(--text2)'>"+h(players[vi])+"</span>";
    html+="<span style='font-size:.72rem;color:var(--text3)'>voted</span>";
    html+="<div class='vav' style='background:"+col(ni)+";width:22px;height:22px;font-size:.7rem'>"+av(ni)+"</div>";
    html+="<span style='font-size:.78rem;font-weight:700;color:"+col(ni)+"'>"+h(players[ni])+"</span>";
    html+="</div>";
  }
  html+="</div>";

  html+="<button class='sb' onclick='goSetup()'>🎲 PLAY AGAIN</button>";
  html+="</div></div>";
  render(html);
  addBackBtn('mvpVote');
}

// ── SHARE ────────────────────────────────────────────────
function setStatus(msg,col){
  var el=document.getElementById("shareStatus");
  if(el){el.textContent=msg;el.style.color=col||"#888898";}
}

function getGameHTML(){
  // Get the full current page HTML
  return "<!DOCTYPE html>\n"+document.documentElement.outerHTML;
}

function shareGame(){
  var status=document.getElementById("shareStatus");
  // Try Web Share API with file (supported on Android Chrome, iOS Safari 15+)
  if(navigator.share){
    try{
      var html=getGameHTML();
      var blob=new Blob([html],{type:"text/html"});
      var file=new File([blob],"imposter-game.html",{type:"text/html"});
      // Check if file sharing is supported
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({
          title:"IMPOSTER — India Edition",
          text:"Play the Tamil Movie Imposter game!",
          files:[file]
        }).then(function(){
          setStatus("Shared successfully! 🎉","#2ecc71");
        }).catch(function(e){
          if(e.name!=="AbortError") fallbackShare();
          else setStatus("","");
        });
      } else {
        // File share not supported, try URL share with data URI
        fallbackShare();
      }
    } catch(e){
      fallbackShare();
    }
  } else {
    fallbackShare();
  }
}

function fallbackShare(){
  // Try sharing as data URI link
  if(navigator.share){
    var html=getGameHTML();
    var b64=btoa(unescape(encodeURIComponent(html)));
    var dataUrl="data:text/html;base64,"+b64;
    navigator.share({
      title:"IMPOSTER — India Edition",
      text:"Tap to play Tamil Movie Imposter game! Download and open the link.",
      url:dataUrl
    }).then(function(){
      setStatus("Link shared! ✓","#2ecc71");
    }).catch(function(e){
      if(e.name!=="AbortError") downloadGame();
    });
  } else {
    downloadGame();
  }
}

function downloadGame(){
  try{
    var html=getGameHTML();
    var blob=new Blob([html],{type:"text/html"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;
    a.download="imposter-game.html";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setStatus("Downloaded! Send the file via WhatsApp or AirDrop 📱","#2ecc71");
    setTimeout(function(){setStatus("");},4000);
  } catch(e){
    setStatus("Open in browser to download","#e74c3c");
  }
}

var _lastPhase=null;
var _lastRoundNum=null;
var _lastDiscussRound=null;
var _lastVoteCount=null;
var _lastResultPhase=null;

function handleRoomUpdate(data){
  var phase=data.phase||"lobby";
  var roundNum=data.roundNum||1;
  var discussRound=data.discussRound||1;

  // Reset NR trigger on every phase transition
  if(phase!=="discuss") _nrTriggered=false;

  // Discuss: re-render only when NR votes change or discuss round changes
  if(phase==="discuss" && _lastPhase==="discuss" && roundNum===_lastRoundNum && discussRound===_lastDiscussRound){
    var voteCount=Object.keys(data.nextRoundVotes||{}).length;
    if(voteCount===_lastVoteCount) return;
    _lastVoteCount=voteCount;
  } else if(phase==="discuss"){
    _lastVoteCount=Object.keys(data.nextRoundVotes||{}).length;
  }

  // Vote: re-render only when vote count changes
  if(phase==="vote" && _lastPhase==="vote" && roundNum===_lastRoundNum){
    var vCount=Object.keys(data.votes||{}).length;
    if(vCount===_lastVoteCount) return;
    _lastVoteCount=vCount;
  } else if(phase==="vote"){
    _lastVoteCount=Object.keys(data.votes||{}).length;
  }

  // Guess: re-render only when guess count changes
  if(phase==="guess" && _lastPhase==="guess"){
    var gCount=Object.keys((data.result&&data.result.guesses)||{}).length;
    if(gCount===_lastVoteCount) return;
    _lastVoteCount=gCount;
  } else if(phase==="guess"){
    _lastVoteCount=Object.keys((data.result&&data.result.guesses)||{}).length;
  }

  _lastPhase=phase;
  _lastRoundNum=roundNum;
  _lastDiscussRound=discussRound;

  if(phase==="lobby"){
    if(ONLINE.isHost) drawHostLobby(ONLINE.roomCode, data.players, data);
    else drawJoineeLobby(data);
  } else if(phase==="spinner"){
    drawOnlineSpinner(data);
  } else if(phase==="playing"){
    showMyRole(data); // always re-render — sticky button re-appended each time
  } else if(phase==="discuss"){
    checkOnlineNRMajority(data);
    drawOnlineDiscuss(data);
  } else if(phase==="vote"){
    drawOnlineVote(data);
  } else if(phase==="guess"){
    drawOnlineGuess(data);
  } else if(phase==="result"){
    drawOnlineResult(data);
  } else if(phase==="leaderboard"){
    drawOnlineLeaderboard(data);
  } else if(phase==="exit"){
    if(ONLINE.listener) ONLINE.roomRef.off("value",ONLINE.listener);
    ONLINE={};
    _lastPhase=null;_lastRoundNum=null;_lastDiscussRound=null;_lastVoteCount=null;
    drawModeSelect();
  }
}

// ── ONLINE ROUND PICKER — mirrors offline pickRound filters ──────────
function _onlinePick(cfg, used){
  var langs=cfg.langs||["Tamil"];
  var cats=cfg.cats||["Movies","Foods","Locations"];
  var eras=cfg.eras||["classic","retro","modern"];

  var allPool=ROUNDS.concat(CUSTOM_MOVIES).concat(buildCustomCatRounds());

  function catOk(r){
    if(r.c==="Food")     return cats.indexOf("Foods")>=0;
    if(r.c==="Location") return cats.indexOf("Locations")>=0;
    if(r.c==="Movie")    return cats.indexOf("Movies")>=0;
    if(r.c==="Custom")   return cats.indexOf("Custom")>=0||cats.indexOf(r.customCat||"")>=0;
    return true;
  }
  function eraOk(r){
    if(r.c!=="Movie") return true;
    var y=parseInt(r.y||"0");
    if(!y) return true;
    for(var ei=0;ei<ERAS.length;ei++){
      if(eras.indexOf(ERAS[ei].key)>=0&&y>=ERAS[ei].minY&&y<=ERAS[ei].maxY) return true;
    }
    return false;
  }
  function langOk(r){
    return r.c==="Food"||r.c==="Location"||r.c==="Custom"||langs.indexOf(r.l)>=0;
  }

  var avail=[];
  // Pass 1: exclude already used
  for(var i=0;i<allPool.length;i++){
    if(used.indexOf(i)>=0) continue;
    var r=allPool[i];
    if(!catOk(r)||!eraOk(r)||!langOk(r)) continue;
    avail.push(i);
  }
  // Pass 2: if empty, reset used
  if(!avail.length){
    for(var i=0;i<allPool.length;i++){
      var r=allPool[i];
      if(!catOk(r)||!eraOk(r)||!langOk(r)) continue;
      avail.push(i);
    }
  }
  // Pass 3: ignore era too if still empty (extreme edge case)
  if(!avail.length){
    for(var i=0;i<allPool.length;i++){
      var r=allPool[i];
      if(!catOk(r)||!langOk(r)) continue;
      avail.push(i);
    }
  }
  if(!avail.length) return null;
  var gi=avail[Math.floor(Math.random()*avail.length)];
  return {gi:gi, round:allPool[gi]};
}

// Generate 15-location list for a location round (actual + 14 decoys), sorted
function _genLocList(roundName){
  var allLocNames=[];
  for(var i=0;i<ROUNDS.length;i++){
    if(ROUNDS[i].c==="Location") allLocNames.push(ROUNDS[i].n);
  }
  var decoys=allLocNames.filter(function(n){return n!==roundName;});
  decoys.sort(function(){return Math.random()-.5;});
  return [roundName].concat(decoys.slice(0,14)).sort();
}

function hostStartGame(){
  var data=ONLINE.gameState;
  if(!data){alert("ERROR: No game state");return;}
  var names=(data.players||[]).filter(function(n){return n&&n.trim();});
  if(names.length<3){alert("Need at least 3 players! Found: "+names.length);return;}
  var cfg=data.cfg;
  if(!cfg){alert("ERROR: No cfg in Firebase data");return;}
  alert("Starting game...\nPlayers: "+names.length+"\nCats: "+JSON.stringify(cfg.cats)+"\nLangs: "+JSON.stringify(cfg.langs));

  // pick round using shared helper
  var used=data.usedRounds||[];
  var picked=_onlinePick(cfg,used);
  if(!picked){
    alert("No rounds available!\nCats: "+JSON.stringify(cfg.cats)+"\nLangs: "+JSON.stringify(cfg.langs));
    return;
  }
  var gi=picked.gi, round=picked.round;

  // pick imposters from full player list (indices match ONLINE.myIdx)
  var allPlayers=data.players||[];
  var filledSlots=[];
  for(var i=0;i<allPlayers.length;i++){
    if(allPlayers[i]&&allPlayers[i].trim()) filledSlots.push(i);
  }
  if(filledSlots.length<3){alert("Need at least 3 players!");return;}

  var impIdxs=[];
  // Round-robin: track who has been imposter to ensure fair rotation
  var usedImps=data.usedImps||[];
  var lastImp=data.lastImp!=null?data.lastImp:-1;
  var freshPool=filledSlots.filter(function(i){return usedImps.indexOf(i)<0;});
  if(!freshPool.length){
    // Everyone has had a turn — start new cycle
    usedImps=[];
    freshPool=filledSlots.slice();
  }
  // Avoid back-to-back same imposter
  var noRepeat=freshPool.filter(function(i){return i!==lastImp;});
  var finalPool=noRepeat.length>=1?noRepeat:freshPool;
  finalPool.sort(function(){return Math.random()-.5;});
  if(cfg.dbl&&filledSlots.length>=5){
    impIdxs=[finalPool[0],finalPool[1]||freshPool[0]];
  } else {
    impIdxs=[finalPool[0]];
  }
  var newUsedImps=usedImps.concat(impIdxs);

  // pick clue type
  var clueType="director";
  if(cfg.diff==="medium"&&round.l==="Tamil"){
    var opts=["director"];
    if(round.hero&&round.hero!=="None"&&round.hero!==round.d)opts.push("hero");
    if(round.heroine&&round.heroine!=="None"&&round.heroine!==round.d)opts.push("heroine");
    if(round.comedian&&round.comedian!=="None"&&round.comedian!==round.d)opts.push("comedian");
    clueType=opts[Math.floor(Math.random()*opts.length)];
  }
  var resolvedClue=_resolveClue(round,clueType);

  // build roles keyed by sanitized player name (slot index as idx)
  var roles={};
  for(var i=0;i<allPlayers.length;i++){
    if(!allPlayers[i]||!allPlayers[i].trim()) continue;
    var isImpFlag=impIdxs.indexOf(i)>=0;
    roles[sanitizeKey(allPlayers[i])]={isImp:isImpFlag,idx:i};
  }

  var usedNew=used.concat([gi]);
  var firstIdx=filledSlots[Math.floor(Math.random()*filledSlots.length)];
  var spinnerSeed=Math.floor(Math.random()*100000);
  var locList=round.c==="Location"?_genLocList(round.n):null;
  ONLINE.roomRef.update({
    phase:"playing",
    spinnerSeed:spinnerSeed,
    players:allPlayers,
    round:{n:round.n,c:round.c,l:round.l,d:round.d,y:round.y,g:round.g,
           hero:round.hero||"None",heroine:round.heroine||"None",
           comedian:round.comedian||"None"},
    roles:roles,
    impIdxs:impIdxs,
    clueType:clueType,
    resolvedClueLabel:resolvedClue.label,
    resolvedClueValue:resolvedClue.value,
    locList:locList,
    firstIdx:firstIdx,
    usedRounds:usedNew,
    usedImps:newUsedImps,
    lastImp:impIdxs[0],
    votes:{},
    guesses:{},
    nextRoundVotes:{},
    roundHistory:[],
    discussRound:1
  });
}

function doJoin(){
  var name=(document.getElementById("joinName").value||"").trim();
  var code=(document.getElementById("joinCode").value||"").trim().toUpperCase();
  var st=document.getElementById("joinStatus");
  if(!name){if(st)st.textContent="⚠️ Enter your name";return;}
  if(code.length!==4){if(st)st.textContent="⚠️ Enter a 4-letter room code";return;}
  if(st)st.textContent="Connecting…";

  ONLINE.myName=name;
  ONLINE.roomCode=code;
  ONLINE.roomRef=DB.ref("rooms/"+code);

  ONLINE.roomRef.once("value").then(function(snap){
    var data=snap.val();
    if(!data){if(st)st.textContent="❌ Room not found";return;}
    if(data.phase!=="lobby"){if(st)st.textContent="❌ Game in progress — wait for Play Again";return;}
    var players=data.players||[];

    // Already in room? Rejoin same slot (handles disconnect/refresh)
    var existingIdx=-1;
    for(var i=0;i<players.length;i++){
      if(players[i]&&players[i].trim().toLowerCase()===name.toLowerCase()){existingIdx=i;break;}
    }
    if(existingIdx>=0){
      ONLINE.myIdx=existingIdx;
      ONLINE.myName=players[existingIdx];
      ONLINE.roomRef.child("joined/"+sanitizeKey(ONLINE.myName)).set(existingIdx)
        .then(function(){listenRoom();});
      return;
    }

    // New player: find empty slot or expand room
    var myIdx=-1;
    for(var i=0;i<players.length;i++){
      if(!players[i]||players[i].trim()===""){myIdx=i;break;}
    }
    if(myIdx<0) myIdx=players.length; // expand

    ONLINE.roomRef.child("players/"+myIdx).set(name).then(function(){
      ONLINE.myIdx=myIdx;
      ONLINE.myName=name;
      ONLINE.roomRef.child("joined/"+sanitizeKey(name)).set(myIdx)
        .then(function(){listenRoom();});
    }).catch(function(e){if(st)st.textContent="❌ Error joining: "+e.message;});
  }).catch(function(e){if(st)st.textContent="❌ Connection error: "+e.message;});
}

var _spinnerRan=false;
var _spinnerPhase=null; // track which game phase the spinner is for

function drawOnlineSpinner(data){
  var players=data.players||[];
  // Filter to filled players only for display
  var filledPlayers=players.filter(function(p){return p&&p.trim();});
  var n=filledPlayers.length;
  var firstIdx=data.firstIdx||0;
  var spinnerSeed=data.spinnerSeed||42;
  var isHost=ONLINE.isHost;

  // Don't re-render if already spinning for this same seed (prevents Firebase update loop resetting the spin)
  var phaseKey=spinnerSeed+"_"+firstIdx;
  if(_spinnerPhase===phaseKey && document.getElementById('spinWheel')){
    return; // Already rendering this spin — don't reset it
  }
  _spinnerPhase=phaseKey;

  // Build conic gradient for wheel segments
  var segColors=["#E91E63","#9C27B0","#3F51B5","#00BFA5","#FF5722","#FFB800","#2196F3","#4CAF50","#FF4081","#7C4DFF","#00E5FF","#FFAB40"];
  var deg=360/n;
  var gradient="conic-gradient(";
  var parts=[];
  for(var i=0;i<n;i++){
    var c=segColors[i%segColors.length];
    parts.push(c+" "+(i*deg)+"deg "+((i+1)*deg)+"deg");
  }
  gradient+=parts.join(",")+")";

  // Find firstIdx position in filled players array
  var firstName=players[firstIdx]||filledPlayers[firstIdx%n]||"";
  var firstColorSpin=segColors[firstIdx%segColors.length];

  var html="<div class='spin-page' id='spinPage'>";
  html+="<div class='spin-wrap'>";
  html+="<p class='spin-eye'>ROUND "+(data.roundNum||1)+" / "+(data.cfg&&data.cfg.tr||3)+" — WHO SPEAKS FIRST?</p>";
  html+="<div class='spin-wheel-outer'>";
  html+="<div class='spin-arrow'>▼</div>";
  html+="<div class='spin-wheel' id='spinWheel' style='background:"+gradient+"'>";
  for(var i=0;i<n;i++){
    var angle=i*deg+deg/2;
    var rad=(angle-90)*Math.PI/180;
    var tx=50+38*Math.cos(rad), ty=50+38*Math.sin(rad);
    html+="<div style='position:absolute;left:"+tx+"%;top:"+ty+"%;transform:translate(-50%,-50%) rotate("+angle+"deg);font-size:"+Math.max(8,Math.floor(26/n))+"px;color:#fff;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.6);pointer-events:none;white-space:nowrap;max-width:60px;overflow:hidden;text-overflow:ellipsis'>"+h(filledPlayers[i].split(' ')[0])+"</div>";
  }
  html+="<div class='spin-center'>🎬</div>";
  html+="</div></div>";
  html+="<div id='spinResult' style='display:none'>";
  html+="<p class='spin-result-lbl'>SPEAKS FIRST THIS ROUND</p>";
  html+="<p class='spin-result-name' id='spinWinnerName' style='color:"+firstColorSpin+"'>"+h(firstName)+"</p>";
  if(isHost){
    html+="<button class='spin-btn' onclick='hostMoveDiscuss()'>START DISCUSSION 💬</button>";
  } else {
    html+="<p class='spin-waiting'>Waiting for host to start discussion…</p>";
    html+="<div class='waiting-anim' style='margin-top:8px'><span></span><span></span><span></span></div>";
  }
  html+="</div>";
  html+="</div></div>";
  render(html);

  // Deterministic rotation — same seed = same final angle on all devices
  var extraRotations=5+(spinnerSeed%8);
  var segAngle=360/n;
  // Map firstIdx (full players array) to position in filled players array
  var filledPos=0;
  var filled=0;
  for(var i=0;i<players.length;i++){
    if(!players[i]||!players[i].trim()) continue;
    if(i===firstIdx){filledPos=filled;break;}
    filled++;
  }
  var landAngle=360-(filledPos*segAngle+segAngle/2);
  var totalRotation=extraRotations*360+landAngle;

  var wheel=document.getElementById('spinWheel');
  if(wheel){
    setTimeout(function(){
      if(!document.getElementById('spinWheel')) return;
      wheel.style.transition="transform 4s cubic-bezier(.17,.67,.12,1)";
      wheel.style.transform="rotate("+totalRotation+"deg)";
      setTimeout(function(){
        var res=document.getElementById('spinResult');
        if(res) res.style.display="block";
      }, 4200);
    }, 400);
  }
}

var _nrTriggered=false;
function checkOnlineNRMajority(data){
  if(!ONLINE.isHost) return;
  if(data.phase!=="discuss") return;
  if(_nrTriggered) return;
  var players=data.players||[];
  var nrVotes=data.nextRoundVotes||{};

  var majority=Math.floor(players.length/2)+1;
  var roundNum=data.roundNum||1;

function hostSkipToNextRound(){
  var data=ONLINE.gameState;
  if(!data)return;
  // Re-discuss same movie — increment discussRound, pick new first speaker
  var newDiscussRound=(data.discussRound||1)+1;
  var newFirstIdx=Math.floor(Math.random()*((data.players||[]).length||1));
  ONLINE.roomRef.update({
    phase:"discuss",
    discussRound:newDiscussRound,
    firstIdx:newFirstIdx,
    nextRoundVotes:{}
  }).then(function(){_nrTriggered=false;}).catch(function(e){_nrTriggered=false;});
  return; // early return — don't pick new movie
  var nextRound=(data.roundNum||1)+1;
  var allPool=ROUNDS.concat(CUSTOM_MOVIES);
  var langs=data.cfg&&data.cfg.langs?data.cfg.langs:["Tamil"];
  var used=data.usedRounds||[];
  var avail=[];
  for(var i=0;i<allPool.length;i++){
    if(used.indexOf(i)<0){
      var r=allPool[i];
      if(r.l==="Food"||langs.indexOf(r.l)>=0) avail.push(i);
    }
  }
  if(!avail.length) avail=allPool.map(function(_,i){return i;});
  var gi=avail[Math.floor(Math.random()*avail.length)];
  var round=allPool[gi];
  var players=data.players||[];
  var pool=players.map(function(_,i){return i;});
  pool.sort(function(){return Math.random()-.5;});
  var impIdxs=[pool[0]];
  var clueType="director";
  if((data.cfg&&data.cfg.diff)==="medium"&&round.l==="Tamil"){
    var opts=["director"];
    if(round.hero&&round.hero!=="None"&&round.hero!==round.d)opts.push("hero");
    if(round.heroine&&round.heroine!=="None"&&round.heroine!==round.d)opts.push("heroine");
    if(round.comedian&&round.comedian!=="None"&&round.comedian!==round.d)opts.push("comedian");
    clueType=opts[Math.floor(Math.random()*opts.length)];
  }
  var resolvedClue=_resolveClue(round,clueType);

  // Use full players array — only pick from filled slots for imposter
  var players=data.players||[];
  var filledSlots=[];
  for(var i=0;i<players.length;i++){
    if(players[i]&&players[i].trim()) filledSlots.push(i);
  }
  filledSlots.sort(function(){return Math.random()-.5;});
  var impIdxs=[filledSlots[0]];

  // Build roles keyed by sanitized name with correct slot idx
  var roles={};
  for(var i=0;i<players.length;i++){
    if(!players[i]||!players[i].trim()) continue;
    roles[sanitizeKey(players[i])]={isImp:impIdxs.indexOf(i)>=0,idx:i};
  }
  var firstIdx=filledSlots[Math.floor(Math.random()*filledSlots.length)];
  var spinnerSeed=Math.floor(Math.random()*100000);
  var locList=round.c==="Location"?_genLocList(round.n):null;
  ONLINE.roomRef.update({
    phase:"playing",
    spinnerSeed:spinnerSeed,
    players:players,
    roundNum:nextRound,
    discussRound:1,
    round:{n:round.n,c:round.c,l:round.l,d:round.d,y:round.y,g:round.g,
           hero:round.hero||"None",heroine:round.heroine||"None",
           comedian:round.comedian||"None"},
    roles:roles,impIdxs:impIdxs,clueType:clueType,
    resolvedClueLabel:resolvedClue.label,resolvedClueValue:resolvedClue.value,
    locList:locList,
    firstIdx:firstIdx,
    usedRounds:used.concat([gi]),
    votes:{},guesses:{},result:null,nextRoundVotes:{}
  }).then(function(){_nrTriggered=false;}).catch(function(e){_nrTriggered=false;});
}

function hostRevealFromGuess(){
  var data=ONLINE.gameState;
  if(!data)return;
  var result=data.result||{};
  var guesses=result.guesses||{};
  var players=data.players||[];
  var round=data.round||{};

  // Convert key-based guesses to idx-based, add guess bonus to scores
  var idxGuesses={};
  var scores=data.scores||{};
  for(var k in guesses){
    for(var i=0;i<players.length;i++){
      if(sanitizeKey(players[i])===k){
        idxGuesses[i]=guesses[k];
        if(guesses[k]&&guesses[k]!=="(skip)"&&guesses[k].trim().toLowerCase()===round.n.toLowerCase()){
          scores[i]=(scores[i]||0)+PTS.ig;
        }
        break;
      }
    }
  }
  ONLINE.roomRef.update({
    phase:"result",
    scores:scores,
    roundHistory:data.roundHistory||[],
    result:{votedIdx:result.votedIdx,impCaught:result.impCaught,tally:result.tally,impGuesses:idxGuesses}
  });
}

function hostShowResult(){
  var data=ONLINE.gameState;
  if(!data)return;
  var votes=data.votes||{};
  var players=data.players||[];
  var impIdxs=data.impIdxs||[];
  var roundNum=data.roundNum||1;

  // tally votes
  var tally={};
  for(var k in votes){
    var v=parseInt(votes[k]);
    if(!isNaN(v)) tally[v]=(tally[v]||0)+1;
  }
  var maxV=0;
  for(var idx in tally){if(tally[idx]>maxV) maxV=tally[idx];}
  var topCandidates=[];
  for(var idx in tally){if(tally[idx]===maxV) topCandidates.push(parseInt(idx));}
  var maxIdx=topCandidates.length===1?topCandidates[0]:-1;
  var impCaught=maxIdx>=0&&impIdxs.indexOf(maxIdx)>=0;
  var cfg=data.cfg||{};

  // Persist cumulative scores
  var prevScores=data.scores||{};
  var newScores={};
  for(var i=0;i<players.length;i++){
    var d=impIdxs.indexOf(i)>=0?(impCaught?PTS.ic:PTS.ie):(impCaught?PTS.pc:PTS.pe);
    newScores[i]=(prevScores[i]||0)+d;
  }

  // Append this round to roundHistory (with votes snapshot for grudge tracker)
  var roundHistory=data.roundHistory||[];
  // Firebase arrays can be tricky — use length as index
  var newHistoryEntry={
    roundNum:roundNum,
    impIdxs:impIdxs,
    caught:impCaught,
    votes:votes  // snapshot of votes for grudge tracker
  };
  var updatedHistory=roundHistory.concat([newHistoryEntry]);

  if(impCaught&&cfg.pts!==false){
    ONLINE.roomRef.update({
      phase:"guess",
      scores:newScores,
      roundHistory:updatedHistory,
      result:{votedIdx:maxIdx,impCaught:impCaught,tally:tally,guesses:{}}
    });
  } else {
    ONLINE.roomRef.update({
      phase:"result",
      scores:newScores,
      roundHistory:updatedHistory,
      result:{votedIdx:maxIdx,impCaught:impCaught,tally:tally}
    });
  }
}

function hostNextRound(){
  var data=ONLINE.gameState;
  if(!data)return;
  var nextRound=(data.roundNum||1)+1;
  var cfg=data.cfg||{};
  var used=data.usedRounds||[];
  var picked=_onlinePick(cfg,used);
  if(!picked) return;
  var gi=picked.gi, round=picked.round;

  // Build filled slots list (matches ONLINE.myIdx)
  var players=data.players||[];
  var filledSlots=[];
  for(var i=0;i<players.length;i++){
    if(players[i]&&players[i].trim()) filledSlots.push(i);
  }

  // ── ROUND-ROBIN IMPOSTER SELECTION ──────────────────────
  // Read history from Firebase so every round is fair
  var usedImps=data.usedImps||[];
  var lastImp=data.lastImp!=null?data.lastImp:-1;

  // Fresh pool: players not yet been imposter this cycle
  var freshPool=filledSlots.filter(function(i){return usedImps.indexOf(i)<0;});
  if(!freshPool.length){
    // Everyone has had a turn — restart cycle
    usedImps=[];
    freshPool=filledSlots.slice();
  }

  // Remove last imposter to prevent back-to-back (unless no choice)
  var noRepeat=freshPool.filter(function(i){return i!==lastImp;});
  var finalPool=noRepeat.length>=1?noRepeat:freshPool;
  finalPool.sort(function(){return Math.random()-.5;});

  var impIdxs=[];
  if(cfg.dbl&&filledSlots.length>=5){
    impIdxs=[finalPool[0], finalPool[1]!==undefined?finalPool[1]:freshPool[0]];
  } else {
    impIdxs=[finalPool[0]];
  }
  var newUsedImps=usedImps.concat(impIdxs);

  // ── CLUE ────────────────────────────────────────────────
  var clueType="director";
  if((cfg.diff==="medium"||!cfg.diff)&&round.l==="Tamil"){
    var opts=["director"];
    if(round.hero&&round.hero!=="None"&&round.hero!==round.d)opts.push("hero");
    if(round.heroine&&round.heroine!=="None"&&round.heroine!==round.d)opts.push("heroine");
    if(round.comedian&&round.comedian!=="None"&&round.comedian!==round.d)opts.push("comedian");
    clueType=opts[Math.floor(Math.random()*opts.length)];
  }
  var resolvedClue=_resolveClue(round,clueType);

  // ── ROLES — keyed by name, idx = full array slot ────────
  var roles={};
  for(var i=0;i<players.length;i++){
    if(!players[i]||!players[i].trim()) continue;
    roles[sanitizeKey(players[i])]={isImp:impIdxs.indexOf(i)>=0,idx:i};
  }

  // First speaker from filled slots only
  var firstIdx=filledSlots[Math.floor(Math.random()*filledSlots.length)];
  var spinnerSeed=Math.floor(Math.random()*100000);

  ONLINE.roomRef.update({
    phase:"playing",
    spinnerSeed:spinnerSeed,
    players:players,
    roundNum:nextRound,
    discussRound:1,
    round:{n:round.n,c:round.c,l:round.l,d:round.d,y:round.y,g:round.g,
           hero:round.hero||"None",heroine:round.heroine||"None",
           comedian:round.comedian||"None"},
    roles:roles,
    impIdxs:impIdxs,
    clueType:clueType,
    resolvedClueLabel:resolvedClue.label,
    resolvedClueValue:resolvedClue.value,
    firstIdx:firstIdx,
    usedRounds:used.concat([gi]),
    usedImps:newUsedImps,
    lastImp:impIdxs[0],
    votes:{},
    guesses:{},
    result:null,
    nextRoundVotes:{}
  }).then(function(){_nrTriggered=false;}).catch(function(e){_nrTriggered=false;});
}

function hostLeaderboard(){

}

function drawOnlineLeaderboard(data){
  var players=data.players||[];
  var scores=data.scores||{};
  var cfg=data.cfg||{};
  var roundHistory=data.roundHistory||[];
  var medals=["🥇","🥈","🥉"];

  // Sort by score descending
  var sorted=players.map(function(_,i){return i;});
  sorted.sort(function(a,b){return (scores[b]||0)-(scores[a]||0);});

  var html="<div class='page'><div class='card'>";
  html+=film();
  html+="<div class='twbanner'><p class='twtxt'>🏆 GAME OVER!</p></div>";
  html+="<p style='text-align:center;color:var(--text3);font-size:.82rem;margin:10px 0 6px'>"+players.length+" players · "+(cfg.tr||3)+" rounds</p>";

  // Leaderboard rows
  html+="<div style='padding:0 18px 12px'>";
  for(var ri=0;ri<sorted.length;ri++){
    var i=sorted[ri];
    var isFirst=ri===0;
    var wasImp=(roundHistory||[]).some(function(rh){return rh&&rh.impIdxs&&rh.impIdxs.indexOf(i)>=0;});
    html+="<div class='lbrow"+(isFirst?" first":"")+"'>";
    html+="<span class='lbmed'>"+(medals[ri]||"#"+(ri+1))+"</span>";
    html+="<div class='lbav' style='background:"+COLORS[i%COLORS.length]+"'>"+AVS[i%AVS.length]+"</div>";
    html+="<span class='lbnm"+(isFirst?" gold":"")+"'>"+h(players[i])+(wasImp?"<span style='font-size:.65rem;color:#e74c3c'> 🕵️</span>":"")+"</span>";
    html+="<span class='lbsc"+(isFirst?" gold":"")+"'>"+(scores[i]||0)+"pt</span>";
    html+="</div>";
  }
  html+="</div>";

  // Grudge tracker — build from Firebase roundHistory votes
  var grudgeMap={};
  for(var ri2=0;ri2<roundHistory.length;ri2++){
    var rh=roundHistory[ri2];
    if(!rh||!rh.votes) continue;
    for(var k in rh.votes){
      var votedIdxG=parseInt(rh.votes[k]);
      var voterIdxG=-1;
      for(var pi=0;pi<players.length;pi++){
        if(sanitizeKey(players[pi])===k){voterIdxG=pi;break;}
      }
      if(voterIdxG<0||isNaN(votedIdxG)||votedIdxG===voterIdxG) continue;
      if(!grudgeMap[voterIdxG]) grudgeMap[voterIdxG]={};
      grudgeMap[voterIdxG][votedIdxG]=(grudgeMap[voterIdxG][votedIdxG]||0)+1;
    }
  }
  var pairs=[];
  for(var vi in grudgeMap){
    for(var vd in grudgeMap[vi]){
      if(grudgeMap[vi][vd]>0) pairs.push({voter:parseInt(vi),voted:parseInt(vd),count:grudgeMap[vi][vd]});
    }
  }
  if(pairs.length>0){
    pairs.sort(function(a,b){return b.count-a.count;});
    var maxCount=pairs[0].count;
    var realGrudges=pairs.filter(function(p){return p.count>=2;});
    html+="<div class='grudge-wrap' id='grudgeWrap'>";
    html+="<div class='grudge-header' onclick='toggleGrudge()'>";
    html+="<span class='grudge-title'>👀 GRUDGE REPORT";
    if(realGrudges.length) html+="<span class='grudge-badge'>"+realGrudges.length+" grudge"+(realGrudges.length>1?"s":"")+"</span>";
    html+="</span><span class='grudge-chevron' id='grudgeChevron'>▼</span></div>";
    html+="<div class='grudge-body' id='grudgeBody'>";
    pairs.slice(0,8).forEach(function(p){
      var isTop=p.count>=2&&p.count===maxCount;
      var eyes=p.count>=3?"🔥":p.count===2?"😤":"👀";
      var label=p.count===1?"voted once":p.count===2?"voted TWICE 😤":p.count===3?"voted 3× — sus! 😱":"voted "+p.count+"× — personal! 💀";
      html+="<div class='grudge-item"+(isTop?" top":"")+"'>";
      html+="<div class='grudge-faces'><div class='grudge-av' style='background:"+COLORS[p.voter%COLORS.length]+"'>"+AVS[p.voter%AVS.length]+"</div>";
      html+="<span class='grudge-arrow'>→</span>";
      html+="<div class='grudge-av' style='background:"+COLORS[p.voted%COLORS.length]+"'>"+AVS[p.voted%AVS.length]+"</div></div>";
      html+="<div class='grudge-text'><div class='grudge-voter'>"+h(players[p.voter]||"?")+" ↠ "+h(players[p.voted]||"?")+"</div>";
      html+="<div class='grudge-detail'>"+label+"</div></div>";
      html+="<span class='grudge-count' style='color:"+(p.count>=3?"#E91E63":p.count===2?"#9C27B0":"var(--text3)")+"'>×"+p.count+"</span>";
      html+="<span class='grudge-eyes'>"+eyes+"</span></div>";
    });
    if(realGrudges.length){
      html+="<div style='text-align:center;padding:8px 4px 4px;color:#E91E63;font-size:.75rem;font-weight:700'>🔥 "+h(players[realGrudges[0].voter]||"?")+" really had it in for "+h(players[realGrudges[0].voted]||"?")+"!</div>";
    }
    html+="</div></div>";
  }

  html+="<div style='padding:0 18px 18px'>";
  if(ONLINE.isHost){
    html+="<button class='sb' style='background:linear-gradient(135deg,#FF8C00,#FFB800,#E91E63)' onclick='drawOnlineMvpVote()'>🎭 VOTE BEST ACTOR</button>";
    html+="<button class='rbtn' style='margin-top:10px' onclick='hostNewGame()'>PLAY AGAIN 🎬</button>";
    html+="<p style='text-align:center;color:var(--text3);font-size:.7rem;margin-top:6px'>All players stay in — new players can scan to join</p>";
    html+="<button onclick='hostExitToMenu()' style='display:block;width:100%;margin-top:8px;padding:11px;border-radius:12px;border:1px solid rgba(156,39,176,.25);background:none;color:var(--text3);font-size:.82rem;cursor:pointer;font-family:DM Sans,sans-serif'>EXIT ROOM</button>";
  } else {
    html+="<p style='color:var(--text3);font-size:.8rem;text-align:center;margin-top:12px'>Waiting for host to start next game…</p>";
    html+="<div class='waiting-anim' style='margin-top:8px'><span></span><span></span><span></span></div>";
    html+="<p style='color:var(--text3);font-size:.7rem;text-align:center;margin-top:16px'>You stay in the room automatically 👍</p>";
  }
  html+="</div>";
  html+=film();
  html+="</div></div>";
  render(html);
}

function hostNewGame(){
  var data=ONLINE.gameState||{};
  var players=data.players||[];
  var cfg=data.cfg||{};
  // Reset dedup state so lobby renders fresh
  _lastPhase=null;_lastRoundNum=null;_lastDiscussRound=null;_lastVoteCount=null;

  // Keep ALL existing players — just reset game state
  // Players don't need to re-scan or rejoin
  // New players can join the lobby before host starts next game
  ONLINE.roomRef.update({
    phase:"lobby",
    players:players,
    joined:data.joined||{},
    round:null,
    roles:null,
    votes:null,
    result:null,
    roundHistory:[],
    usedRounds:[],
    roundNum:1,
    scores:{},
    nextRoundVotes:{},
    discussRound:1,
    impIdxs:null,
    usedImps:[],      // reset imposter rotation for new game
    lastImp:-1,
    cfg:cfg
  });
}

function hostExitToMenu(){
  ONLINE.roomRef.update({phase:"exit"});
  if(ONLINE.listener) ONLINE.roomRef.off("value",ONLINE.listener);
  ONLINE={};
  drawModeSelect();
}


// ── ONLINE MVP VOTE (pass device around, same as offline) ──
function drawOnlineMvpVote(){
  // Reuse offline MVP vote — players are in data.players
  var data=ONLINE.gameState||{};
  var names=(data.players||[]).filter(function(n){return n&&n.trim();});
  // Temporarily set G.players so the offline MVP functions work
  G.players=names;
  G.mvpVotes={};
  drawMvpVote(); // reuse offline MVP vote screen
}

// ── PWA — SERVICE WORKER + INSTALL BANNER ─────────────────
(function(){
  // Register external service worker (sw.js must be in same folder on GitHub)
  // Force clear old service worker caches so updates always load fresh
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(r){r.unregister();});
    });
    if('caches' in window){
      caches.keys().then(function(keys){
        keys.forEach(function(k){caches.delete(k);});
      });
    }
    setTimeout(function(){
      navigator.serviceWorker.register('./sw.js',{scope:'./'}).catch(function(){});
    },1000);
  }

  // Install Banner — Android Chrome fires this automatically
  var _deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();
    _deferredPrompt=e;
    try{ if(localStorage.getItem('pwa_dismissed')) return; }catch(ex){}
    showPWABanner();
  });

  function showPWABanner(){
    if(document.getElementById('pwaBanner')) return;
    var banner=document.createElement('div');
    banner.id='pwaBanner';
    banner.className='pwa-banner';
    banner.innerHTML=
      '<div class="pwa-ico">🕵️</div>'+
      '<div class="pwa-text">'+
        '<div class="pwa-title">Install Imposter India</div>'+
        '<div class="pwa-sub">Play offline anytime — add to Home Screen</div>'+
      '</div>'+
      '<button class="pwa-install-btn" onclick="triggerPWAInstall()">INSTALL</button>'+
      '<button class="pwa-close-btn" onclick="dismissPWABanner()" title="Dismiss">✕</button>';
    document.body.appendChild(banner);
  }

  window.triggerPWAInstall=function(){
    if(!_deferredPrompt) return;
    _deferredPrompt.prompt();
    _deferredPrompt.userChoice.then(function(){
      _deferredPrompt=null;
      dismissPWABanner();
    });
  };

  window.dismissPWABanner=function(){
    var b=document.getElementById('pwaBanner');
    if(b) b.remove();
    try{localStorage.setItem('pwa_dismissed','1');}catch(ex){}
  };

  // iOS Safari — manual tip
  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  var isStandalone=window.navigator.standalone===true;
  if(isIOS&&!isStandalone){
    try{
      if(!localStorage.getItem('pwa_dismissed')&&!localStorage.getItem('ios_tip_shown')){
        setTimeout(function(){
          if(document.getElementById('pwaBanner')) return;
          var banner=document.createElement('div');
          banner.id='pwaBanner';
          banner.className='pwa-banner';
          banner.innerHTML=
            '<div class="pwa-ico">📲</div>'+
            '<div class="pwa-text">'+
              '<div class="pwa-title">Add to Home Screen</div>'+
              '<div class="pwa-sub">Tap <strong style="color:#E91E63">Share</strong> → <strong style="color:#E91E63">Add to Home Screen</strong> to install</div>'+
            '</div>'+
            '<button class="pwa-close-btn" onclick="dismissPWABanner()" title="Dismiss">✕</button>';
          document.body.appendChild(banner);
          localStorage.setItem('ios_tip_shown','1');
        }, 3500);
      }
    }catch(ex){}
  }
})();
</script>
